name: arcane_lexicon
description: Transform markdown directories into beautiful documentation websites with auto-generated navigation, search, theming, and more. Built on Jaspr.
version: 1.3.0
repository: https://github.com/ArcaneArts/arcane_lexicon
homepage: https://github.com/ArcaneArts/arcane_lexicon
documentation: https://github.com/ArcaneArts/arcane_lexicon#readme

topics:
  - documentation
  - markdown
  - static-site
  - jaspr
  - knowledge-base

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.23.0
  jaspr_content: ^0.5.0
  jaspr_lucide: ^0.49.0
  arcane_jaspr: ^3.1.0

  yaml: ^3.1.3
  json5: ^0.8.2

dev_dependencies:
  build_runner: ^2.11.1
  jaspr_builder: ^0.23.0
  lints: ^6.1.0

dependency_overrides:
  arcane_jaspr:
    path: ../arcane_jaspr

scripts:
  serve_demo: dart tool/arcane_lexicon_demo.dart
  build_demo: dart tool/arcane_lexicon_demo.dart build
