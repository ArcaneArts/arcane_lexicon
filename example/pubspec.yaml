name: arcane_lexicon_example
description: Example knowledge base using arcane_lexicon
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.0

dependencies:
  shelf: ^1.4.2
  web: ^1.1.1
  arcane_lexicon:
    path: ../
  arcane_jaspr_shadcn:
    path: ../../arcane_jaspr/packages/arcane_jaspr_shadcn
  arcane_jaspr_neon:
    path: ../../arcane_jaspr/packages/arcane_jaspr_neon
  arcane_jaspr_neubrutalism:
    path: ../../arcane_jaspr/packages/arcane_jaspr_neubrutalism
  jaspr: ^0.23.0
  jaspr_content: ^0.5.0

dev_dependencies:
  build_runner: ^2.11.1
  build_web_compilers: ^4.4.18
  jaspr_builder: ^0.23.0
  lints: ^6.1.0

dependency_overrides:
  arcane_jaspr:
    path: ../../arcane_jaspr

jaspr:
  mode: static
  port: 8081

scripts:
  serve: dart ../tool/arcane_lexicon_demo.dart
  serve_release: dart ../tool/arcane_lexicon_demo.dart serve --release
  build: dart ../tool/arcane_lexicon_demo.dart build
  clean: jaspr clean
  killall: dart ../tool/arcane_lexicon_demo.dart killall
