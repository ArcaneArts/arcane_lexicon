name: arcane_inkwell
description: Transform markdown directories into beautiful documentation websites with auto-generated navigation, search, theming, and more. Built on Jaspr.
version: 1.2.0
repository: https://github.com/ArcaneArts/arcane_inkwell
homepage: https://github.com/ArcaneArts/arcane_inkwell
documentation: https://github.com/ArcaneArts/arcane_inkwell#readme

topics:
  - documentation
  - markdown
  - static-site
  - jaspr
  - knowledge-base

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.22.3
  jaspr_content: ^0.5.0
  arcane_jaspr:
    path: ../arcane_jaspr

  yaml: ^3.1.3
  json5: ^0.8.2

dev_dependencies:
  build_runner: ^2.11.1
  jaspr_builder: ^0.22.3
  lints: ^6.1.0
